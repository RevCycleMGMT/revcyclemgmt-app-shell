  <text x="858" y="396" class="kicker">First 30-Day Action Plan</text>
  <rect x="842" y="386" width="372" height="42" rx="8" fill="#071316" stroke="#21414a"/><text x="858" y="404" class="tiny strong">Days 1-3 | Operations lead | Low</text><text x="858" y="420" class="tiny">Name one accountable owner for every unassigned stage.</text><rect x="842" y="438" width="372" height="42" rx="8" fill="#071316" stroke="#21414a"/><text x="858" y="456" class="tiny strong">Days 4-7 | Biller | Medium</text><text x="858" y="472" class="tiny">Stand up daily 999 and 277CA review for rejected synthetic cohorts.</text><rect x="842" y="490" width="372" height="42" rx="8" fill="#071316" stroke="#21414a"/><text x="858" y="508" class="tiny strong">Days 8-12 | Coder | Medium</text><text x="858" y="524" class="tiny">Create coding-readiness checklist for missing documentation cohorts.</text><rect x="842" y="542" width="372" height="42" rx="8" fill="#071316" stroke="#21414a"/><text x="858" y="560" class="tiny strong">Days 13-18 | Denials specialist | Medium</text><text x="858" y="576" class="tiny">Build denial and remit variance workqueues by owner, age, and dollars at</text><rect x="842" y="594" width="372" height="42" rx="8" fill="#071316" stroke="#21414a"/><text x="858" y="612" class="tiny strong">Days 19-24 | Posting | Medium</text><text x="858" y="628" class="tiny">Install posting cadence for 835 matchback and responsibility balance sep</text>
  <rect x="58" y="704" width="1162" height="30" rx="15" fill="#00B3A4"/>
  <text x="640" y="724" text-anchor="middle" fill="#021415" font-size="14" font-weight="900">All IDs, payer labels, dollar figures, and claim events are synthetic demo data.</text>
