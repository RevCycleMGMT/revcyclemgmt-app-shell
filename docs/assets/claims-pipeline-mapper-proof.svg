8" y="305" class="tiny">paid | 2d</text><text x="778" y="324" class="tiny">AR follow-up</text><path d="M870 238 L940 238" stroke="#31545c" stroke-width="5" stroke-linecap="round"/><circle cx="968" cy="238" r="24" fill="#fb7185"/><text x="968" y="244" class="node" text-anchor="middle">7</text><text x="926" y="286" class="tiny strong">835 remit</text><text x="926" y="305" class="tiny">denied | 9d</text><text x="926" y="324" class="tiny">Denials specialist</text><path d="M1018 238 L1088 238" stroke="#31545c" stroke-width="5" stroke-linecap="round"/><circle cx="1116" cy="238" r="24" fill="#facc15"/><text x="1116" y="244" class="node" text-anchor="middle">8</text><text x="1074" y="286" class="tiny strong">Payment posting</text><text x="1074" y="305" class="tiny">stuck | 9d</text><text x="1074" y="324" class="tiny">Denials specialist</text>
